<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <title>Product Filter</title>
    <style>
      img {
        height: 200px;
      }
    </style>
  </head>

  <body class="bg-light">
    <div class="container mt-5">
      <h2 class="text-center mb-4">Product Store</h2>

      <div class="row">
        <!-- FILTER SIDEBAR -->
        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h5 class="mb-3">Filters</h5>

            <!-- Search -->
            <div class="mb-3">
              <label class="form-label">Search</label>
              <input
                type="text"
                id="search-input"
                class="form-control"
                placeholder="Search product..."
              />
            </div>

            <!-- Category -->
            <div class="mb-3">
              <label class="form-label">Category</label>

              <select id="category-filter" class="form-select">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="accessories">Accessories</option>
              </select>
            </div>

            <!-- Price Range -->
            <div class="mb-3">
              <label class="form-label">
                Max Price: $<span id="price-value">1500</span>
              </label>

              <input
                type="range"
                class="form-range"
                id="price-filter"
                min="50"
                max="1500"
                value="1500"
              />
            </div>

            <!-- Reset Button -->
            <button class="btn btn-outline-danger w-100" id="reset-filters">
              Reset Filters
            </button>
          </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="col-md-9">
          <div class="d-flex justify-content-between mb-3">
            <h5>
              Products
              <span class="badge bg-secondary" id="product-count">6</span>
            </h5>
          </div>

          <div class="row g-4" id="product-list">
            <!-- Laptop -->
            <div
              class="col-md-4 product-item"
              data-category="electronics"
              data-price="1200"
            >
              <div class="card h-100 shadow-sm">
                <img
                  src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8"
                  class="card-img-top"
                  alt="Laptop"
                />

                <div class="card-body">
                  <span class="badge bg-primary mb-2">Electronics</span>

                  <h5 class="product-name">Laptop</h5>

                  <p class="text-muted">$1200</p>

                  <p class="small text-warning">★★★★☆</p>
                </div>
              </div>
            </div>

            <!-- Phone -->
            <div
              class="col-md-4 product-item"
              data-category="electronics"
              data-price="800"
            >
              <div class="card h-100 shadow-sm">
                <img
                  src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
                  class="card-img-top"
                  alt="Phone"
                />

                <div class="card-body">
                  <span class="badge bg-primary mb-2">Electronics</span>

                  <h5 class="product-name">Phone</h5>

                  <p class="text-muted">$800</p>

                  <p class="small text-warning">★★★★★</p>
                </div>
              </div>
            </div>

            <!-- Headphones -->
            <div
              class="col-md-4 product-item"
              data-category="accessories"
              data-price="150"
            >
              <div class="card h-100 shadow-sm">
                <img
                  src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd"
                  class="card-img-top"
                  alt="Headphones"
                />

                <div class="card-body">
                  <span class="badge bg-success mb-2">Accessories</span>

                  <h5 class="product-name">Headphones</h5>

                  <p class="text-muted">$150</p>

                  <p class="small text-warning">★★★★☆</p>
                </div>
              </div>
            </div>

            <!-- Keyboard -->
            <div
              class="col-md-4 product-item"
              data-category="accessories"
              data-price="100"
            >
              <div class="card h-100 shadow-sm">
                <img
                  src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f"
                  class="card-img-top"
                  alt="Keyboard"
                />

                <div class="card-body">
                  <span class="badge bg-success mb-2">Accessories</span>

                  <h5 class="product-name">Keyboard</h5>

                  <p class="text-muted">$100</p>

                  <p class="small text-warning">★★★☆☆</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
