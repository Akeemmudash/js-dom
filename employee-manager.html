<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <title>Employee Manager</title>
  </head>

  <body class="bg-light" id="employee-page">
    <div class="container mt-5">
      <h2 class="text-center mb-4">Employee Manager</h2>

      <div class="card shadow">
        <div class="card-body">
          <div class="row g-2 mb-4">
            <div class="col-md-3">
              <input
                type="text"
                id="employee-name"
                class="form-control"
                placeholder="Employee Name"
              />
            </div>

            <div class="col-md-3">
              <input
                type="text"
                id="employee-department"
                class="form-control"
                placeholder="Department"
              />
            </div>

            <div class="col-md-3">
              <input
                type="number"
                id="employee-salary"
                class="form-control"
                placeholder="Salary"
              />
            </div>

            <div class="col-md-3">
              <button id="add-employee-btn" class="btn btn-primary w-100">
                Add Employee
              </button>
            </div>
          </div>

          <table class="table table-bordered">
            <thead class="table-dark">
              <tr>
                <th>Name</th>
                <th>Department</th>
                <th>Salary</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="employee-table-body"></tbody>
          </table>

          <div class="mt-3">
            <strong>Total Employees:</strong>
            <span id="total-employees">1</span>
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
